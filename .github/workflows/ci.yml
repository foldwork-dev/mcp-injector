name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Consistency Lint
      run: python3 scripts/lint-consistency.py

    - name: Run SEO Lint
      run: python3 scripts/lint-seo.py

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v11
      with:
        staticDistDir: './website'
        temporaryPublicStorage: true
        runs: 1

    - name: Run Go Tests
      run: go test $(go list ./... | grep -v '/scratch' | grep -v '/test')
