name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: website

jobs:
  lint:
    name: Consistency Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Checkout mcp-benchmark
        uses: actions/checkout@v7
        with:
          repository: foldwork-dev/mcp-benchmark
          path: mcp-benchmark
      - name: Run lint-consistency
        run: |
          # We need to make sure the script runs from the repository root since
          # working-directory is set to 'website' by default
          cd $GITHUB_WORKSPACE
          python3 scripts/lint-consistency.py

  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: website/go.mod

      - name: Run tests
        run: go test ./... -v -timeout 120s

  build:
    name: Build check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: website/go.mod

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o /dev/null ./...
